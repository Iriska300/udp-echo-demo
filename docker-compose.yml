services:
  echo-server:
    build: ./server
    container_name: udp-echo-server
    ports:
      - "8080:8080/udp"
    networks:
      - vran-network
    mem_limit: 128m
    cpus: '0.5'
    restart: unless-stopped

  echo-client:
    build: ./client
    container_name: udp-echo-client
    networks:
      - vran-network
    stdin_open: true
    tty: true

networks:
  vran-network:
    driver: bridge
