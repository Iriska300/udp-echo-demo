apiVersion: apps/v1
kind: Deployment
metadata:
  name: udp-echo-server
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: udp-echo-server
  template:
    metadata:
      labels:
        app: udp-echo-server
    spec:
      containers:
        - name: echo-server
          image: udp-echo-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              protocol: UDP
